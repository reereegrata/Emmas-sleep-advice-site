<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="favMoon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B4B8A"/>
      <stop offset="100%" stop-color="#7B6BAE"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#favMoon)"/>

  <!-- Crescent moon -->
  <circle cx="52" cy="48" r="30" fill="#F4D0B4"/>
  <circle cx="62" cy="42" r="24" fill="url(#favMoon)"/>

  <!-- Closed sleeping eye -->
  <path d="M38 50 Q42 46 48 50" stroke="#3D2E6B" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Zzz -->
  <text x="62" y="28" font-family="Arial, sans-serif" font-weight="700" font-size="8" fill="#F4D0B4" opacity="0.8">z</text>
  <text x="70" y="22" font-family="Arial, sans-serif" font-weight="700" font-size="6" fill="#F4D0B4" opacity="0.5">z</text>
</svg>
